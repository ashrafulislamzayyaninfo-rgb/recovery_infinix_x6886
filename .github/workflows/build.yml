name: Recovery Build Final Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt update
          sudo apt install -y abootimg curl unzip

      - name: Download from Release
        run: |
          mkdir output
          # রিলিজ থেকে সরাসরি ডাউনলোড করার লিঙ্ক (নিশ্চিত করুন আপনার রিলিজ ট্যাগ 'V1' আছে)
          curl -L -H "Accept: application/octet-stream" -o vendor_boot.zip "https://github.com/ashrafulislamzayyaninfo-rgb/recovery_infinix_x6886/releases/download/V1/vendor_boot_original.img.zip"
          
          # আনজিপ এবং চেকিং
          unzip vendor_boot.zip
          mv vendor_boot_original.img vendor_boot.img

      - name: Final Build Step
        run: |
          if [ -f "original_dtb.img" ]; then
            cp original_dtb.img output/
          fi
          cp vendor_boot.img output/OrangeFox_Infinix_X6886.img
          echo "Full build completed with large files" > output/log.txt

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Final-Result
          path: output/*
