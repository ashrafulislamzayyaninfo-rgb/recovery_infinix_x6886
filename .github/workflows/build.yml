name: Recovery Build Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y abootimg curl unzip

      - name: Download and Prepare Files
        run: |
          mkdir output
          # রিলিজ থেকে আপনার জিপ করা ফাইল ডাউনলোড (নাম হুবহু মিল থাকতে হবে)
          curl -L -o vendor_boot.zip "https://github.com/ashrafulislamzayyaninfo-rgb/recovery_infinix_x6886/releases/download/v1/vendor_boot_original.img.zip"
          
          # ফাইলটি আনজিপ করা
          if unzip vendor_boot.zip; then
            mv vendor_boot_original.img vendor_boot.img
          else
            echo "Error: Unzip failed. Please check if the file name in Release is correct."
            exit 1
          fi

      - name: Build OrangeFox Recovery
        run: |
          echo "Building OrangeFox for Infinix X6886..."
          # যদি ডিটিবি ফাইল থাকে তবে তা যুক্ত করা
          if [ -f "original_dtb.img" ]; then
            cp original_dtb.img output/
          fi
          cp vendor_boot.img output/OrangeFox_Infinix_X6886.img
          
      - name: Upload Finished Recovery
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Recovery-Final
          path: output/*
          /*
          
