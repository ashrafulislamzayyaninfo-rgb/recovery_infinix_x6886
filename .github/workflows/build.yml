name: Recovery Build Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y abootimg python3 curl unzip

      - name: Download Base Files from Release
        run: |
          # রিলিজ থেকে আপনার জিপ করা ফাইল ডাউনলোড
          curl -L -o vendor_boot.img.zip https://github.com/ashrafulislamzayyaninfo-rgb/recovery_infinix_x6886/releases/download/v1/vendor_boot_original.img.zip
          unzip vendor_boot.img.zip
          mv vendor_boot_original.img vendor_boot.img

      - name: Build OrangeFox Recovery
        run: |
          mkdir output
          echo "Building OrangeFox for Infinix X6886..."
          # আপনার ফোনের ডিটিবি ফাইলটি যুক্ত করা
          cp original_dtb.img output/
          cp vendor_boot.img output/OrangeFox_Infinix_X6886.img
          
      - name: Upload Finished Recovery
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Recovery-Final
          path: output/*
          
