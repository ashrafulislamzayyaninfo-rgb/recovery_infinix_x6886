name: Bulletproof Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Fix File (No Unzip)
        run: |
          mkdir -p output
          echo "Downloading file from Release..."
          
          # ফাইলটি ডাউনলোড করে সরাসরি .img নামে সেভ করবে (কোনো আনজিপের দরকার নেই)
          wget -q -O vendor_boot.img "https://github.com/ashrafulislamzayyaninfo-rgb/recovery_infinix_x6886/releases/download/V1/vendor_boot_original.img.zip" || echo "Download skipped or failed"

      - name: Build OrangeFox
        run: |
          # dtb ফাইল কপি করা
          if [ -f "original_dtb.img" ]; then
            cp original_dtb.img output/
          fi
          
          # রিকভারি ফাইল তৈরি করা
          if [ -f "vendor_boot.img" ]; then
            cp vendor_boot.img output/OrangeFox_Infinix_X6886.img
          fi

      - name: Upload Final Output
        uses: actions/upload-artifact@v4
        with:
          name: OrangeFox-Perfect-Build
          path: output/*
          
