name: Recovery Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Output Folder
        run: |
          mkdir output
          # আপনার রিপোজিটরির বর্তমান ফাইলগুলো প্যাকেজ করা
          cp *.img output/ 2>/dev/null || true
          cp *.mk output/ 2>/dev/null || true
          echo "Test build successful" > output/status.txt

      - name: Upload Files
        uses: actions/upload-artifact@v4
        with:
          name: Recovery-Basic-Files
          path: output/*
          
